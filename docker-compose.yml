services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gameficacao
      POSTGRES_PASSWORD: gameficacao_secret
      POSTGRES_DB: gameficacao_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameficacao"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
