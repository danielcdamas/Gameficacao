default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DB_PORT") { "5432" } %>
  username: <%= ENV.fetch("DB_USERNAME") { "gameficacao" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "gameficacao_secret" } %>

development:
  <<: *default
  database: gameficacao_development

test:
  <<: *default
  database: gameficacao_test

production:
  primary: &primary_production
    <<: *default
    database: gameficacao_production
    username: <%= ENV["DB_USERNAME"] %>
    password: <%= ENV["DB_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: gameficacao_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: gameficacao_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: gameficacao_production_cable
    migrations_paths: db/cable_migrate
